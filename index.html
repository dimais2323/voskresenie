<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>воскресенье — видеохостинг</title>
    <!-- Video.js плеер -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <!-- HLS.js поддержка -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #0c0c14; color: #f0f0f0; line-height: 1.5; }
        .app { max-width: 1440px; margin: 0 auto; padding: 0 24px; }

        /* Шапка */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; gap: 20px; flex-wrap: wrap; border-bottom: 1px solid #2a2a38; margin-bottom: 24px; }
        .logo { font-size: 2rem; font-weight: 600; color: #ffb347; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo i { font-size: 2.3rem; }
        .search-box { flex: 1; min-width: 260px; display: flex; gap: 8px; }
        .search-box input { flex: 1; padding: 12px 20px; border-radius: 60px; border: none; background: #1e1e2c; color: white; font-size: 1rem; outline: 1px solid #3a3a4e; }
        .search-box input:focus { outline: 2px solid #ffb347; }
        .search-box button { background: #ffb347; border: none; border-radius: 60px; padding: 0 24px; color: #0c0c14; font-weight: 600; cursor: pointer; }
        .user-section { display: flex; gap: 12px; align-items: center; }
        .user-section button { background: #1e1e2c; border: 1px solid #3a3a4e; color: white; padding: 8px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .user-section button:hover { background: #ffb347; color: #0c0c14; border-color: #ffb347; }
        .avatar { width: 46px; height: 46px; border-radius: 50%; background: #ffb347; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0c0c14; font-size: 1.4rem; cursor: pointer; }
        .header-actions { display: flex; gap: 12px; }
        .header-actions button { background: #1e1e2c; border: none; color: white; width: 48px; height: 48px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; border: 1px solid #3a3a4e; transition: 0.2s; }
        .header-actions button:hover { background: #ffb347; color: #0c0c14; }

        /* Модальные окна */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a26; padding: 40px; border-radius: 40px; width: 90%; max-width: 400px; border: 1px solid #ffb34740; }
        .modal-content h2 { margin-bottom: 24px; color: #ffb347; }
        .modal-content input { width: 100%; padding: 14px; margin-bottom: 16px; background: #2c2c3c; border: 1px solid #444; border-radius: 30px; color: white; }
        .modal-content button { width: 100%; padding: 14px; background: #ffb347; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
        .modal-content .switch-link { color: #aaa; text-align: center; cursor: pointer; }
        .modal-content .switch-link:hover { color: #ffb347; }

        /* Страницы */
        .page { display: none; }
        .page.active { display: block; }

        /* Карточки видео */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 28px; margin: 30px 0; }
        .video-card { cursor: pointer; transition: 0.2s; }
        .video-card:hover { transform: scale(1.02); }
        .thumbnail { position: relative; width: 100%; aspect-ratio: 16/9; background: #1a1a28; border-radius: 20px; overflow: hidden; margin-bottom: 10px; border: 1px solid #33333f; }
        .thumbnail.vertical { aspect-ratio: 9/16; max-width: 260px; }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .thumb-overlay { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 30px; font-size: 0.8rem; border: 1px solid #ffb347; }

        /* Горизонтальный скролл */
        .scroll-section { margin: 40px 0; }
        .scroll-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .scroll-header h2 { font-size: 1.6rem; border-left: 5px solid #ffb347; padding-left: 16px; }
        .scroll-controls button { background: #1e1e2c; border: 1px solid #3a3a4e; color: white; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; margin-left: 10px; }
        .scroll-controls button:hover { background: #ffb347; color: #0c0c14; }
        .scroll-container { display: flex; overflow-x: auto; gap: 24px; scroll-behavior: smooth; padding: 5px 0 15px; scrollbar-width: thin; scrollbar-color: #ffb347 #20202a; }
        .scroll-container::-webkit-scrollbar { height: 8px; }
        .scroll-container::-webkit-scrollbar-track { background: #20202a; border-radius: 10px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #ffb347; border-radius: 10px; }
        .scroll-item { flex: 0 0 auto; width: 280px; }

        /* Плеер */
        .player-section { background: #000; border-radius: 28px; overflow: hidden; margin-bottom: 20px; border: 1px solid #3a3a4e; }
        .video-js { width: 100%; aspect-ratio: 16/9; background: #0a0a12; }
        .video-js.vjs-9-16 { aspect-ratio: 9/16; }
        .video-stats { display: flex; gap: 30px; margin: 20px 0; flex-wrap: wrap; }
        .video-stats i { color: #ffb347; margin-right: 5px; }
        .channel-header { display: flex; align-items: center; gap: 20px; background: #161624; padding: 16px 28px; border-radius: 60px; margin: 20px 0; }

        /* Загрузка */
        .upload-form { max-width: 700px; margin: 20px auto; background: #161624; padding: 35px; border-radius: 36px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; color: #ffb347; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px; background: #20202e; border: 1px solid #3a3a4e; border-radius: 30px; color: white; }
        .preview-block { display: flex; gap: 20px; align-items: center; background: #20202e; padding: 20px; border-radius: 30px; margin: 15px 0; }
        .thumb-preview { width: 200px; height: 112px; background: #2c2c3c; border-radius: 16px; overflow: hidden; border: 2px solid #ffb347; }
        .thumb-preview img { width: 100%; height: 100%; object-fit: cover; }
        .btn { background: #ffb347; color: #0c0c14; font-weight: 700; padding: 16px 32px; border: none; border-radius: 50px; cursor: pointer; font-size: 1rem; border: 2px solid #ffb347; transition: 0.2s; }
        .btn:hover { background: transparent; color: #ffb347; }
        .moderation-note { background: #2a1f1a; padding: 15px; border-radius: 20px; border-left: 5px solid #ffaa33; margin: 20px 0; }
        .checkbox-label { display: flex; align-items: center; gap: 12px; background: #20202e; padding: 12px 20px; border-radius: 40px; }

        /* Кнопка скачивания */
        .download-btn { background: #1e1e2c; border: 1px solid #ffb347; color: #ffb347; padding: 10px 20px; border-radius: 30px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; margin-left: 15px; }
        .download-btn:hover { background: #ffb347; color: #0c0c14; }

        .footer { margin-top: 60px; padding: 20px; text-align: center; color: #666; border-top: 1px solid #2a2a38; }
    </style>
</head>
<body>
<div class="app">
    <!-- ШАПКА -->
    <header class="header">
        <div class="logo" onclick="navigateTo('home')">
            <i class="fas fa-sun"></i> воскресенье
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск...">
            <button onclick="searchVideos()"><i class="fas fa-search"></i></button>
        </div>
        <div class="user-section" id="userSection">
            <!-- динамически: либо кнопки вход/регистрация, либо аватар -->
        </div>
        <div class="header-actions">
            <button onclick="navigateTo('upload')" title="Загрузить"><i class="fas fa-plus"></i></button>
            <button onclick="resetAndReload()" title="Сброс"><i class="fas fa-sync-alt"></i></button>
        </div>
    </header>

    <!-- МОДАЛКИ ВХОДА / РЕГИСТРАЦИИ -->
    <div id="authModal" class="modal">
        <div class="modal-content" id="authModalContent">
            <!-- динамическое содержимое -->
        </div>
    </div>

    <!-- ГЛАВНАЯ -->
    <div id="homePage" class="page active">
        <section class="scroll-section">
            <div class="scroll-header">
                <h2>🔥 Рекомендации</h2>
                <div class="scroll-controls">
                    <button onclick="scrollHoriz('recs', -1)"><i class="fas fa-chevron-left"></i></button>
                    <button onclick="scrollHoriz('recs', 1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="scroll-container" id="recsContainer"></div>
        </section>
        <section class="scroll-section">
            <div class="scroll-header">
                <h2>📱 Вертикальные</h2>
                <div class="scroll-controls">
                    <button onclick="scrollHoriz('vert', -1)"><i class="fas fa-chevron-left"></i></button>
                    <button onclick="scrollHoriz('vert', 1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="scroll-container" id="verticalFeedContainer"></div>
        </section>
    </div>

    <!-- СТРАНИЦА ВИДЕО -->
    <div id="videoPage" class="page">
        <div class="player-section">
            <video-js id="realVideoPlayer" class="vjs-default-skin vjs-big-play-centered" controls preload="auto">
                <source src="" type="video/mp4" id="videoSource">
            </video-js>
        </div>
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <h2 id="videoTitle"></h2>
            <button class="download-btn" id="downloadVideoBtn" onclick="downloadCurrentVideo()"><i class="fas fa-download"></i> Скачать</button>
        </div>
        <div class="video-stats">
            <span><i class="fas fa-eye"></i> <span id="videoViews">0</span></span>
            <span><i class="fas fa-thumbs-up"></i> <span id="videoLikes">0</span></span>
            <span><i class="fas fa-clock"></i> <span id="videoDuration">0:00</span></span>
        </div>
        <p id="videoDescription"></p>
        <div class="channel-header">
            <i class="fas fa-user-circle" style="font-size:3rem;"></i>
            <div><a href="#" id="videoChannelLink" class="channel-link" style="font-size:1.4rem;"></a></div>
        </div>
        <h3>Ещё с канала</h3>
        <div class="video-grid" id="moreFromChannel"></div>
    </div>

    <!-- СТРАНИЦА КАНАЛА -->
    <div id="channelPage" class="page">
        <div style="display: flex; gap: 24px; background:#161624; padding:20px 30px; border-radius:60px; margin-bottom:30px;">
            <i class="fas fa-user-circle" style="font-size:5rem;"></i>
            <div><h1 id="channelName"></h1><p id="channelStats"></p></div>
        </div>
        <h3>Все видео</h3>
        <div class="video-grid" id="channelVideosList"></div>
    </div>

    <!-- ЗАГРУЗКА -->
    <div id="uploadPage" class="page">
        <div class="upload-form">
            <h2 style="margin-bottom:20px;">Загрузить видео</h2>
            <div class="form-group">
                <label>📹 Видео (MP4)</label>
                <input type="file" id="videoFile" accept="video/mp4">
            </div>
            <div class="form-group">
                <label>🖼️ Обложка (превью)</label>
                <input type="file" id="thumbFile" accept="image/*">
                <div class="preview-block" id="thumbPreviewBlock" style="display:none;">
                    <div class="thumb-preview" id="thumbPreviewImg"></div>
                    <span>Превью обложки</span>
                </div>
            </div>
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="videoTitleInput" maxlength="100">
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea id="videoDescInput"></textarea>
            </div>
            <div class="form-group">
                <label>Ориентация</label>
                <select id="videoOrientation">
                    <option value="horizontal">Горизонтальное (до 15 ч)</option>
                    <option value="vertical">Вертикальное (до 3 мин)</option>
                </select>
            </div>
            <div class="moderation-note">
                <i class="fas fa-shield-alt"></i> 18+, курение, алкоголь — только с образовательной целью или 18+
            </div>
            <div class="checkbox-label">
                <input type="checkbox" id="educationalCheck"> <label>Образовательные цели</label>
            </div>
            <div class="checkbox-label">
                <input type="checkbox" id="adultContentCheck"> <label>Взрослый контент (18+)</label>
            </div>
            <button class="btn" onclick="publishVideo()" style="width:100%;"><i class="fas fa-upload"></i> Опубликовать</button>
            <p id="uploadMessage" style="margin-top:15px; color:#ffaa33;"></p>
        </div>
    </div>

    <!-- ПОИСК -->
    <div id="searchPage" class="page">
        <h2>Результаты: "<span id="searchQuerySpan"></span>"</h2>
        <div class="video-grid" id="searchResultsGrid"></div>
    </div>
</div>

<footer class="footer">
    <p>воскресенье — вход, регистрация, превью, скачивание, модерация</p>
</footer>

<script>
    (function() {
        // ================== ДАННЫЕ ==================
        let videos = [];
        let users = [];
        let currentUser = null; // { username, channelId, channelName }
        const STORAGE_VIDEOS = 'sunday_videos';
        const STORAGE_USERS = 'sunday_users';
        const STORAGE_SESSION = 'sunday_session';
        let lastWatchedTags = JSON.parse(localStorage.getItem('lastTags')) || [];

        // Загрузка
        function loadData() {
            let storedVideos = localStorage.getItem(STORAGE_VIDEOS);
            if (storedVideos) videos = JSON.parse(storedVideos);
            else {
                // стартовые видео с реальными превью (imgur работает)
                videos = [
                    { id: 'v1', title: 'Кот в коробке', channelId: 'ch1', channelName: 'Pets', views: 125000, likes: 8300, desc: 'Вертикальное видео с котом', orientation: 'vertical', duration: 59, thumbnail: 'https://i.imgur.com/5K7vIqI.jpg', videoUrl: 'https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/1080/Big_Buck_Bunny_1080_10s_1MB.mp4', educational: false, adult: false, tags: ['животные'] },
                    { id: 'v2', title: 'Обзор камеры', channelId: 'ch2', channelName: 'TechReview', views: 34000, likes: 2100, desc: 'Горизонтальный обзор', orientation: 'horizontal', duration: 482, thumbnail: 'https://i.imgur.com/J3aJ9qW.jpg', videoUrl: 'https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/1080/Big_Buck_Bunny_1080_10s_1MB.mp4', educational: false, adult: false, tags: ['техника'] },
                    { id: 'v3', title: 'Йога утром', channelId: 'ch3', channelName: 'Здоровье', views: 89000, likes: 5200, desc: 'Вертикальное', orientation: 'vertical', duration: 175, thumbnail: 'https://i.imgur.com/Y2W0o6E.jpg', videoUrl: 'https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/1080/Big_Buck_Bunny_1080_10s_1MB.mp4', educational: true, adult: false, tags: ['спорт'] },
                    { id: 'v4', title: 'Документальный', channelId: 'ch4', channelName: 'History', views: 230000, likes: 18400, desc: 'Образовательное', orientation: 'horizontal', duration: 1250, thumbnail: 'https://i.imgur.com/mA3fLx8.jpg', videoUrl: 'https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/1080/Big_Buck_Bunny_1080_10s_1MB.mp4', educational: true, adult: false, tags: ['история'] },
                ];
                saveVideos();
            }
            let storedUsers = localStorage.getItem(STORAGE_USERS);
            if (storedUsers) users = JSON.parse(storedUsers);
            else {
                users = [{ username: 'demo', password: 'demo', channelId: 'demo_ch', channelName: 'Демо канал' }];
                saveUsers();
            }
            let session = localStorage.getItem(STORAGE_SESSION);
            if (session) {
                currentUser = JSON.parse(session);
            }
        }
        function saveVideos() { localStorage.setItem(STORAGE_VIDEOS, JSON.stringify(videos)); }
        function saveUsers() { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
        function saveSession() { if (currentUser) localStorage.setItem(STORAGE_SESSION, JSON.stringify(currentUser)); else localStorage.removeItem(STORAGE_SESSION); }

        loadData();

        // ========== АВТОРИЗАЦИЯ ==========
        function renderUserSection() {
            let section = document.getElementById('userSection');
            if (currentUser) {
                section.innerHTML = `<div class="avatar" onclick="openChannel('${currentUser.channelId}')">${currentUser.username[0].toUpperCase()}</div>`;
            } else {
                section.innerHTML = `<button onclick="showAuthModal('login')"><i class="fas fa-sign-in-alt"></i> Вход</button><button onclick="showAuthModal('register')"><i class="fas fa-user-plus"></i> Регистрация</button>`;
            }
        }

        window.showAuthModal = function(mode) {
            let modal = document.getElementById('authModal');
            let content = document.getElementById('authModalContent');
            if (mode === 'login') {
                content.innerHTML = `
                    <h2>Вход</h2>
                    <input type="text" id="loginUsername" placeholder="Имя пользователя">
                    <input type="password" id="loginPassword" placeholder="Пароль">
                    <button onclick="login()">Войти</button>
                    <p class="switch-link" onclick="showAuthModal('register')">Нет аккаунта? Зарегистрироваться</p>
                    <p style="color:#aaa; margin-top:10px;">demo / demo</p>
                `;
            } else {
                content.innerHTML = `
                    <h2>Регистрация</h2>
                    <input type="text" id="regUsername" placeholder="Имя">
                    <input type="password" id="regPassword" placeholder="Пароль">
                    <button onclick="register()">Зарегистрироваться</button>
                    <p class="switch-link" onclick="showAuthModal('login')">Уже есть аккаунт? Войти</p>
                `;
            }
            modal.classList.add('active');
        };

        window.closeModal = function() {
            document.getElementById('authModal').classList.remove('active');
        };

        window.login = function() {
            let username = document.getElementById('loginUsername').value;
            let password = document.getElementById('loginPassword').value;
            let user = users.find(u => u.username === username && u.password === password);
            if (user) {
                currentUser = { username: user.username, channelId: user.channelId, channelName: user.channelName };
                saveSession();
                closeModal();
                renderUserSection();
            } else alert('Неверные данные');
        };

        window.register = function() {
            let username = document.getElementById('regUsername').value;
            let password = document.getElementById('regPassword').value;
            if (!username || !password) return alert('Заполните поля');
            if (users.find(u => u.username === username)) return alert('Имя занято');
            let newChannelId = 'ch_' + Date.now();
            let newUser = { username, password, channelId: newChannelId, channelName: `Канал ${username}` };
            users.push(newUser);
            saveUsers();
            currentUser = { username, channelId: newChannelId, channelName: `Канал ${username}` };
            saveSession();
            closeModal();
            renderUserSection();
        };

        // ========== НАВИГАЦИЯ ==========
        window.navigateTo = function(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page + 'Page').classList.add('active');
            if (page === 'home') renderHome();
        };

        // ========== РЕНДЕРЫ ==========
        function renderHome() {
            let recs = [...videos];
            if (lastWatchedTags.length > 0) {
                recs.sort((a,b) => (b.tags?.filter(t => lastWatchedTags.includes(t)).length || 0) - (a.tags?.filter(t => lastWatchedTags.includes(t)).length || 0));
            } else recs.sort(() => Math.random() - 0.5);
            renderScroll('recsContainer', recs.filter(v => v.orientation === 'horizontal'), false);
            renderScroll('verticalFeedContainer', videos.filter(v => v.orientation === 'vertical'), true);
        }

        function renderScroll(containerId, items, isVertical) {
            let container = document.getElementById(containerId);
            container.innerHTML = '';
            items.forEach(v => {
                let div = document.createElement('div');
                div.className = 'scroll-item';
                div.innerHTML = `
                    <div class="video-card" onclick="openVideo('${v.id}')">
                        <div class="thumbnail ${isVertical ? 'vertical' : ''}">
                            <img src="${v.thumbnail || 'https://i.imgur.com/5ZQmFmM.jpg'}" onerror="this.src='https://i.imgur.com/5ZQmFmM.jpg'">
                            <span class="thumb-overlay">${formatDuration(v.duration)}</span>
                        </div>
                        <div class="video-details">
                            <h4>${v.title}</h4>
                            <p><a href="#" onclick="openChannel('${v.channelId}'); return false;" class="channel-link">${v.channelName}</a> • ${v.views} просмотров</p>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.openVideo = function(videoId) {
            let video = videos.find(v => v.id === videoId);
            if (!video) return;
            video.views = (video.views || 0) + 1;
            saveVideos();
            if (video.tags) {
                lastWatchedTags.push(...video.tags);
                if (lastWatchedTags.length > 8) lastWatchedTags = lastWatchedTags.slice(-8);
                localStorage.setItem('lastTags', JSON.stringify(lastWatchedTags));
            }

            document.getElementById('videoTitle').innerText = video.title;
            document.getElementById('videoViews').innerText = video.views;
            document.getElementById('videoLikes').innerText = video.likes || 0;
            document.getElementById('videoDuration').innerText = formatDuration(video.duration);
            document.getElementById('videoDescription').innerText = video.desc;
            let channelLink = document.getElementById('videoChannelLink');
            channelLink.innerText = video.channelName;
            channelLink.onclick = (e) => { e.preventDefault(); openChannel(video.channelId); };

            // плеер
            const player = videojs('realVideoPlayer');
            player.src({ src: video.videoUrl, type: 'video/mp4' });
            if (video.orientation === 'vertical') document.getElementById('realVideoPlayer').classList.add('vjs-9-16');
            else document.getElementById('realVideoPlayer').classList.remove('vjs-9-16');
            player.load();

            // кнопка скачивания
            document.getElementById('downloadVideoBtn').setAttribute('data-url', video.videoUrl);
            document.getElementById('downloadVideoBtn').setAttribute('data-title', video.title);

            // ещё с канала
            let more = videos.filter(v => v.channelId === video.channelId && v.id !== video.id);
            let moreDiv = document.getElementById('moreFromChannel');
            moreDiv.innerHTML = '';
            more.forEach(v => {
                moreDiv.innerHTML += `<div class="video-card" onclick="openVideo('${v.id}')"><div class="thumbnail"><img src="${v.thumbnail}"></div><h4>${v.title}</h4></div>`;
            });

            navigateTo('video');
        };

        // ========== СКАЧИВАНИЕ ==========
        window.downloadCurrentVideo = function() {
            let url = document.getElementById('downloadVideoBtn').getAttribute('data-url');
            let title = document.getElementById('downloadVideoBtn').getAttribute('data-title') || 'video';
            if (!url) return alert('Видео не найдено');
            const a = document.createElement('a');
            a.href = url;
            a.download = title + '.mp4';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        window.openChannel = function(channelId) {
            let channelVideos = videos.filter(v => v.channelId === channelId);
            if (!channelVideos.length) return;
            document.getElementById('channelName').innerText = channelVideos[0].channelName;
            document.getElementById('channelStats').innerText = `Видео: ${channelVideos.length} • Подписчиков: 10.2K`;
            let list = document.getElementById('channelVideosList');
            list.innerHTML = '';
            channelVideos.forEach(v => {
                list.innerHTML += `<div class="video-card" onclick="openVideo('${v.id}')"><div class="thumbnail"><img src="${v.thumbnail}"></div><h4>${v.title}</h4><p>${v.views} просмотров</p></div>`;
            });
            navigateTo('channel');
        };

        window.searchVideos = function() {
            let q = document.getElementById('searchInput').value.toLowerCase();
            document.getElementById('searchQuerySpan').innerText = q;
            let res = videos.filter(v => v.title.toLowerCase().includes(q));
            let grid = document.getElementById('searchResultsGrid');
            grid.innerHTML = '';
            res.forEach(v => {
                grid.innerHTML += `<div class="video-card" onclick="openVideo('${v.id}')"><div class="thumbnail"><img src="${v.thumbnail}"></div><h4>${v.title}</h4><p>${v.channelName}</p></div>`;
            });
            navigateTo('search');
        };

        window.scrollHoriz = function(type, dir) {
            let id = type === 'recs' ? 'recsContainer' : 'verticalFeedContainer';
            document.getElementById(id).scrollLeft += dir * 350;
        };

        window.resetAndReload = function() {
            localStorage.removeItem('lastTags');
            location.reload();
        };

        // превью обложки
        document.getElementById('thumbFile')?.addEventListener('change', function(e) {
            let file = e.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('thumbPreviewImg').innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
                    document.getElementById('thumbPreviewBlock').style.display = 'flex';
                };
                reader.readAsDataURL(file);
            } else document.getElementById('thumbPreviewBlock').style.display = 'none';
        });

        // публикация
        window.publishVideo = function() {
            if (!currentUser) { alert('Сначала войдите'); showAuthModal('login'); return; }
            let file = document.getElementById('videoFile').files[0];
            let title = document.getElementById('videoTitleInput').value.trim();
            let desc = document.getElementById('videoDescInput').value.trim();
            let orientation = document.getElementById('videoOrientation').value;
            let thumbFile = document.getElementById('thumbFile').files[0];
            let educational = document.getElementById('educationalCheck').checked;
            let adult = document.getElementById('adultContentCheck').checked;
            if (!file || !title) { document.getElementById('uploadMessage').innerText = 'Заполните поля'; return; }

            // модерация
            let lower = (title + ' ' + desc).toLowerCase();
            if (!educational && !adult) {
                if (lower.includes('кур') || lower.includes('алкоголь') || lower.includes('18+') || lower.includes('секс')) {
                    document.getElementById('uploadMessage').innerText = '⚠️ Требуется галочка образовательных целей или 18+';
                    return;
                }
            }
            let newId = 'vid_' + Date.now();
            let newVideo = {
                id: newId,
                title, desc, orientation,
                channelId: currentUser.channelId,
                channelName: currentUser.channelName,
                views: 0, likes: 0,
                duration: orientation === 'vertical' ? 120 : 600,
                thumbnail: 'https://i.imgur.com/5ZQmFmM.jpg',
                videoUrl: URL.createObjectURL(file),
                educational, adult, tags: []
            };
            if (thumbFile) {
                let reader = new FileReader();
                reader.onload = function(ev) {
                    newVideo.thumbnail = ev.target.result;
                    videos.push(newVideo);
                    saveVideos();
                    document.getElementById('uploadMessage').innerText = '✅ Опубликовано!';
                    setTimeout(() => navigateTo('home'), 1000);
                };
                reader.readAsDataURL(thumbFile);
            } else {
                videos.push(newVideo);
                saveVideos();
                document.getElementById('uploadMessage').innerText = '✅ Опубликовано!';
                setTimeout(() => navigateTo('home'), 1000);
            }
        };

        function formatDuration(sec) {
            let m = Math.floor(sec/60); let s = Math.floor(sec%60); return `${m}:${s.toString().padStart(2,'0')}`;
        }

        // инициализация
        renderUserSection();
        renderHome();

        // клик вне модалки
        window.onclick = function(e) {
            let modal = document.getElementById('authModal');
            if (e.target === modal) modal.classList.remove('active');
        };
    })();
</script>
</body>
</html>
