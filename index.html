<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>воскресенье — видеохостинг</title>
    <!-- Video.js плеер -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #0c0c14; color: #f0f0f0; line-height: 1.5; }
        .app { max-width: 1440px; margin: 0 auto; padding: 0 24px; }

        /* Шапка */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; gap: 20px; flex-wrap: wrap; border-bottom: 1px solid #2a2a38; margin-bottom: 24px; }
        .logo { font-size: 2rem; font-weight: 600; color: #ffb347; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo i { font-size: 2.3rem; }
        .search-box { flex: 1; min-width: 260px; display: flex; gap: 8px; }
        .search-box input { flex: 1; padding: 12px 20px; border-radius: 60px; border: none; background: #1e1e2c; color: white; font-size: 1rem; outline: 1px solid #3a3a4e; }
        .search-box input:focus { outline: 2px solid #ffb347; }
        .search-box button { background: #ffb347; border: none; border-radius: 60px; padding: 0 24px; color: #0c0c14; font-weight: 600; cursor: pointer; }
        .user-section { display: flex; gap: 12px; align-items: center; }
        .user-section button { background: #1e1e2c; border: 1px solid #3a3a4e; color: white; padding: 8px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .user-section button:hover { background: #ffb347; color: #0c0c14; border-color: #ffb347; }
        .avatar { width: 46px; height: 46px; border-radius: 50%; background: #ffb347; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0c0c14; font-size: 1.4rem; cursor: pointer; }
        .header-actions { display: flex; gap: 12px; }
        .header-actions button { background: #1e1e2c; border: none; color: white; width: 48px; height: 48px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; border: 1px solid #3a3a4e; transition: 0.2s; }
        .header-actions button:hover { background: #ffb347; color: #0c0c14; }

        /* Модальные окна */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a26; padding: 40px; border-radius: 40px; width: 90%; max-width: 400px; border: 1px solid #ffb34740; }
        .modal-content h2 { margin-bottom: 24px; color: #ffb347; }
        .modal-content input { width: 100%; padding: 14px; margin-bottom: 16px; background: #2c2c3c; border: 1px solid #444; border-radius: 30px; color: white; }
        .modal-content button { width: 100%; padding: 14px; background: #ffb347; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
        .modal-content .switch-link { color: #aaa; text-align: center; cursor: pointer; }
        .modal-content .switch-link:hover { color: #ffb347; }

        /* Страницы */
        .page { display: none; }
        .page.active { display: block; }

        /* Карточки видео */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 28px; margin: 30px 0; }
        .video-card { cursor: pointer; transition: 0.2s; }
        .video-card:hover { transform: scale(1.02); }
        .thumbnail { position: relative; width: 100%; aspect-ratio: 16/9; background: #1a1a28; border-radius: 20px; overflow: hidden; margin-bottom: 10px; border: 1px solid #33333f; }
        .thumbnail.vertical { aspect-ratio: 9/16; max-width: 260px; }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .thumb-overlay { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 30px; font-size: 0.8rem; border: 1px solid #ffb347; }

        /* Горизонтальный скролл */
        .scroll-section { margin: 40px 0; }
        .scroll-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .scroll-header h2 { font-size: 1.6rem; border-left: 5px solid #ffb347; padding-left: 16px; }
        .scroll-controls button { background: #1e1e2c; border: 1px solid #3a3a4e; color: white; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; margin-left: 10px; }
        .scroll-controls button:hover { background: #ffb347; color: #0c0c14; }
        .scroll-container { display: flex; overflow-x: auto; gap: 24px; scroll-behavior: smooth; padding: 5px 0 15px; scrollbar-width: thin; scrollbar-color: #ffb347 #20202a; }
        .scroll-container::-webkit-scrollbar { height: 8px; }
        .scroll-container::-webkit-scrollbar-track { background: #20202a; border-radius: 10px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #ffb347; border-radius: 10px; }
        .scroll-item { flex: 0 0 auto; width: 280px; }

        /* Плеер */
        .player-section { background: #000; border-radius: 28px; overflow: hidden; margin-bottom: 20px; border: 1px solid #3a3a4e; }
        .video-js { width: 100%; aspect-ratio: 16/9; background: #0a0a12; }
        .video-js.vjs-9-16 { aspect-ratio: 9/16; }
        .video-stats { display: flex; gap: 30px; margin: 20px 0; flex-wrap: wrap; }
        .video-stats i { color: #ffb347; margin-right: 5px; }
        .channel-header { display: flex; align-items: center; gap: 20px; background: #161624; padding: 16px 28px; border-radius: 60px; margin: 20px 0; }

        /* Загрузка */
        .upload-form { max-width: 700px; margin: 20px auto; background: #161624; padding: 35px; border-radius: 36px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; color: #ffb347; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px; background: #20202e; border: 1px solid #3a3a4e; border-radius: 30px; color: white; }
        .preview-block { display: flex; gap: 20px; align-items: center; background: #20202e; padding: 20px; border-radius: 30px; margin: 15px 0; }
        .thumb-preview { width: 200px; height: 112px; background: #2c2c3c; border-radius: 16px; overflow: hidden; border: 2px solid #ffb347; }
        .thumb-preview img { width: 100%; height: 100%; object-fit: cover; }
        .btn { background: #ffb347; color: #0c0c14; font-weight: 700; padding: 16px 32px; border: none; border-radius: 50px; cursor: pointer; font-size: 1rem; border: 2px solid #ffb347; transition: 0.2s; }
        .btn:hover { background: transparent; color: #ffb347; }
        .moderation-note { background: #2a1f1a; padding: 15px; border-radius: 20px; border-left: 5px solid #ffaa33; margin: 20px 0; }
        .checkbox-label { display: flex; align-items: center; gap: 12px; background: #20202e; padding: 12px 20px; border-radius: 40px; }

        /* Кнопка скачивания */
        .download-btn { background: #1e1e2c; border: 1px solid #ffb347; color: #ffb347; padding: 10px 20px; border-radius: 30px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; margin-left: 15px; }
        .download-btn:hover { background: #ffb347; color: #0c0c14; }

        .footer { margin-top: 60px; padding: 20px; text-align: center; color: #666; border-top: 1px solid #2a2a38; }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="logo" onclick="navigateTo('home')">
            <i class="fas fa-sun"></i> воскресенье
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск...">
            <button onclick="searchVideos()"><i class="fas fa-search"></i></button>
        </div>
        <div class="user-section" id="userSection"></div>
        <div class="header-actions">
            <button onclick="navigateTo('upload')" title="Загрузить"><i class="fas fa-plus"></i></button>
            <button onclick="resetAndReload()" title="Сброс"><i class="fas fa-sync-alt"></i></button>
        </div>
    </header>

    <div id="authModal" class="modal">
        <div class="modal-content" id="authModalContent"></div>
    </div>

    <div id="homePage" class="page active">
        <section class="scroll-section">
            <div class="scroll-header">
                <h2>🔥 Рекомендации</h2>
                <div class="scroll-controls">
                    <button onclick="scrollHoriz('recs', -1)"><i class="fas fa-chevron-left"></i></button>
                    <button onclick="scrollHoriz('recs', 1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="scroll-container" id="recsContainer"></div>
        </section>
    </div>

    <div id="videoPage" class="page">
        <div class="player-section">
            <video-js id="realVideoPlayer" class="vjs-default-skin vjs-big-play-centered" controls preload="auto">
                <source src="" type="video/mp4" id="videoSource">
            </video-js>
        </div>
        <h2 id="videoTitle"></h2>
        <div class="video-stats">
            <span><i class="fas fa-eye"></i> <span id="videoViews">0</span></span>
            <span><i class="fas fa-thumbs-up"></i> <span id="videoLikes">0</span></span>
        </div>
        <div class="channel-header">
            <a href="#" id="videoChannelLink" class="channel-link"></a>
        </div>
    </div>

    <div id="uploadPage" class="page">
        <div class="upload-form">
            <h2>Загрузить видео</h2>
            <input type="file" id="videoFile" accept="video/*">
            <input type="text" id="videoTitleInput" placeholder="Название">
            <button onclick="publishVideo()">Опубликовать</button>
        </div>
    </div>
</div>

<script>
    let videos = JSON.parse(localStorage.getItem('videos')) || [];
    let currentUser = null;

    function navigateTo(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
    }

    function publishVideo() {
        alert('Видео опубликовано!');
    }
</script>
</body>
</html>
